name: Deploy to GitHub Pages

on:
  schedule:
    # 每周一早上 9:00 UTC (北京时间 17:00)
    - cron: '0 9 * * 1'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Signal
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          # SMTP (set in repo Secrets to enable email, or use --no-email)
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SENDER: ${{ secrets.SMTP_SENDER }}
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
          SMTP_RECEIVER: ${{ secrets.SMTP_RECEIVER }}
          SUMMARY_DAYS: '7'
          SUMMARY_LANGUAGE: 'zh-CN'
        run: python3 cli.py run  # add --email to enable email delivery

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/
          git diff --staged --quiet || git commit -m "docs: update digest $(date +%Y-%m-%d)"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true
